<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0e271f">
  <title>Ingreso al panel | EGEI Digital</title>
  <link rel="stylesheet" href="../assets/css/login-premium.css?v=68">
</head>
<body class="login-premium-page">
  <div class="login-backdrop" aria-hidden="true"></div>
  <div class="login-shade" aria-hidden="true"></div>

  <main class="login-layout">
    <section class="login-glass-card" aria-labelledby="login-title">
      <header class="login-brand">
        <img src="../assets/images/branding/logo-egei.png" alt="Fundación EGEI Digital">
        <div>
          <strong>Fundación EGEI Digital</strong>
          <span>Panel administrativo</span>
        </div>
      </header>

      <div class="login-heading">
        <span class="login-kicker">ACCESO PRIVADO</span>
        <h1 id="login-title">Iniciar sesión</h1>
        <p>Bienvenido nuevamente. Ingresa tus datos para administrar la plataforma.</p>
      </div>

      <form id="login-form" class="login-form" novalidate>
        <label class="login-field" for="login-user">
          <span class="sr-only">Usuario</span>
          <span class="field-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 12a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9Zm-8 9a8 8 0 0 1 16 0"/></svg>
          </span>
          <input id="login-user" name="username" autocomplete="username" required placeholder="Nombre de usuario">
        </label>

        <label class="login-field" for="login-password">
          <span class="sr-only">Contraseña</span>
          <span class="field-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><rect x="4" y="10" width="16" height="11" rx="3"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
          </span>
          <input id="login-password" name="password" type="password" autocomplete="current-password" required placeholder="Contraseña">
          <button id="toggle-password" class="password-toggle" type="button" aria-label="Mostrar contraseña" title="Mostrar contraseña">
            <svg class="eye-open" viewBox="0 0 24 24"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" viewBox="0 0 24 24"><path d="m3 3 18 18M10.6 6.2A11 11 0 0 1 12 6c6.5 0 10 6 10 6a18 18 0 0 1-3 3.8M6.4 6.4C3.6 8.2 2 12 2 12s3.5 6 10 6a10 10 0 0 0 4-.8M9.9 9.9a3 3 0 0 0 4.2 4.2"/></svg>
          </button>
        </label>

        <div class="login-options">
          <label class="remember-option">
            <input id="remember-user" type="checkbox">
            <span class="custom-check" aria-hidden="true">✓</span>
            <span>Recordar usuario</span>
          </label>
          <a href="../index.html">Volver al sitio</a>
        </div>

        <button class="login-submit" type="submit">
          <span>Ingresar al panel</span>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M14 7l5 5-5 5"/></svg>
        </button>

        <p class="login-error" id="login-error" role="alert" aria-live="polite"></p>
      </form>

      <footer class="login-footer">
        <span>Acceso exclusivo para administración</span>
        <strong>EGEI Digital · Versión 6.8</strong>
      </footer>
    </section>
  </main>

  <script src="../assets/js/login-premium.js?v=68"></script>
</body>
</html>
