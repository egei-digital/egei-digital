<style>
:root{--bg:#06101b;--panel:#0b1930;--line:rgba(255,255,255,.14);--text:#f7fbff;--muted:#b9c7d8;--green:#36ce76;--green2:#a6df3d}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,#122744 0,#06101b 55%);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text)}body{min-height:100dvh;display:flex;flex-direction:column;overflow:hidden}.topbar{display:flex;align-items:center;gap:14px;min-height:72px;padding:10px 18px;background:rgba(3,11,24,.88);border-bottom:1px solid var(--line);backdrop-filter:blur(18px);z-index:20}.back,.full{display:inline-flex;align-items:center;justify-content:center;gap:9px;min-height:44px;padding:0 16px;border:0;border-radius:999px;text-decoration:none;font-weight:850;cursor:pointer}.back{color:#10230f;background:linear-gradient(135deg,var(--green),var(--green2));box-shadow:0 10px 28px rgba(54,206,118,.26)}.full{margin-left:auto;color:#fff;background:rgba(255,255,255,.08);border:1px solid var(--line)}.identity{min-width:0}.identity strong{display:block;font-size:1rem}.identity small{display:block;color:var(--muted)}.viewer{position:relative;flex:1;min-height:0;display:grid;place-items:center;padding:18px 88px 76px;overflow:hidden}.book{position:relative;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));width:min(1040px,92vw);height:min(76vh,780px);background:#101010;border-radius:12px;box-shadow:0 34px 90px rgba(0,0,0,.48);overflow:hidden;perspective:1800px}.book::after{content:"";position:absolute;left:50%;top:0;bottom:0;width:18px;transform:translateX(-50%);background:linear-gradient(90deg,rgba(0,0,0,.22),rgba(255,255,255,.08),rgba(0,0,0,.24));z-index:8;pointer-events:none}.page{display:none;min-width:0;height:100%;background:#fff;overflow:hidden;animation:turn .38s ease}.page.visible{display:block}.page img{display:block;width:100%;height:100%;object-fit:contain;background:#fff}@keyframes turn{from{opacity:.35;transform:rotateY(4deg) scale(.985)}to{opacity:1;transform:none}}.nav{position:absolute;top:50%;transform:translateY(-50%);width:56px;height:56px;border-radius:50%;border:1px solid rgba(255,255,255,.22);background:rgba(6,16,27,.78);color:#fff;font-size:1.55rem;cursor:pointer;backdrop-filter:blur(12px);box-shadow:0 12px 30px rgba(0,0,0,.3)}.prev{left:20px}.next{right:20px}.nav:disabled{opacity:.3;cursor:not-allowed}.controls{position:absolute;left:50%;bottom:20px;transform:translateX(-50%);display:flex;align-items:center;gap:12px;padding:9px 14px;border-radius:999px;background:rgba(6,16,27,.84);border:1px solid var(--line);backdrop-filter:blur(14px)}.controls span{color:var(--muted);font-size:.9rem}.dots{display:flex;gap:5px}.dot{width:7px;height:7px;border:0;border-radius:50%;background:#607086;padding:0;cursor:pointer}.dot.active{width:22px;border-radius:999px;background:var(--green)}
@media(max-width:760px){.topbar{min-height:64px;padding:8px 10px;gap:9px}.back{padding:0 12px}.back .label{display:none}.identity strong{font-size:.9rem}.identity small{font-size:.72rem}.full{font-size:0;width:44px;padding:0}.full::after{content:"⛶";font-size:1.15rem}.viewer{padding:10px 12px 72px}.book{grid-template-columns:1fr;width:min(92vw,520px);height:min(75vh,720px)}.book::after{display:none}.nav{top:auto;bottom:16px;width:48px;height:48px;z-index:12}.prev{left:14px}.next{right:14px}.controls{bottom:17px;max-width:calc(100% - 130px)}}@media(prefers-reduced-motion:reduce){.page{animation:none}}
</style></head><body><header class="topbar"><a class="back" href="index.html#cursos"><span>←</span><span class="label">Volver al inicio</span></a><div class="identity"><strong>Pensum - Curso de Redes Sociales</strong><small>11 páginas · Fundación EGEI Digital</small></div><button class="full" id="fullscreen" type="button">Pantalla completa</button></header><main class="viewer" id="viewer"><button class="nav prev" id="prev" aria-label="Página anterior">‹</button><div class="book" id="book"><div class="page" data-page="1"><img src="assets/pensum/redes-sociales/page-01.png" alt="Pensum de Redes Sociales - página 1" loading="eager"></div>

<script>
const pages=[...document.querySelectorAll('.page')],book=document.querySelector('#book'),counter=document.querySelector('#counter'),prev=document.querySelector('#prev'),next=document.querySelector('#next'),dots=document.querySelector('#dots');let current=0;const mobile=()=>matchMedia('(max-width:760px)').matches;const step=()=>mobile()?1:2;pages.forEach((_,i)=>{const b=document.createElement('button');b.className='dot';b.type='button';b.ariaLabel='Ir a la página '+(i+1);b.addEventListener('click',()=>{current=i;render()});dots.appendChild(b)});function render(){const count=step();if(!mobile())current=Math.floor(current/2)*2;pages.forEach((p,i)=>p.classList.toggle('visible',i>=current&&i<current+count));counter.textContent=(current+1)+(count===2&&current+1<pages.length?'–'+Math.min(current+2,pages.length):'')+' / '+pages.length;prev.disabled=current===0;next.disabled=current+count>=pages.length;[...dots.children].forEach((d,i)=>d.classList.toggle('active',i>=current&&i<current+count))}prev.addEventListener('click',()=>{current=Math.max(0,current-step());render()});next.addEventListener('click',()=>{current=Math.min(pages.length-1,current+step());render()});addEventListener('resize',render);addEventListener('keydown',e=>{if(e.key==='ArrowRight')next.click();if(e.key==='ArrowLeft')prev.click();if(e.key==='Escape'&&document.fullscreenElement)document.exitFullscreen()});let x=0;book.addEventListener('touchstart',e=>x=e.touches[0].clientX,{passive:true});book.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-x;if(Math.abs(d)>45)(d<0?next:prev).click()},{passive:true});document.querySelector('#fullscreen').addEventListener('click',async()=>{try{document.fullscreenElement?await document.exitFullscreen():await document.querySelector('#viewer').requestFullscreen()}catch(e){}});render();
</script></body></html>
