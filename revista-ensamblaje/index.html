<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#07130d" />

<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">E</div>
        <div>
          <strong>EGEI DIGITAL</strong>
          <span>Revista de Ensamblaje de Computadoras</span>
        </div>
      </div>
      <div class="top-actions">
        <a class="icon-btn back-site" href="../" aria-label="Volver al inicio">← Volver al inicio</a>

    <section class="viewer" aria-label="Revista digital">

        <div class="sheet left"><img id="leftPage" alt="" /></div>
